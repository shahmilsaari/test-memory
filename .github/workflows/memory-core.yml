name: memory-core
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Ensure memories.json exists
        run: |
          test -f memories.json || (echo "memories.json missing. Run: memory-core export" && exit 1)
      - run: npx @shahmilsaari/memory-core check --ci
